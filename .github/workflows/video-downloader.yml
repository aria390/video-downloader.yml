name: Universal Video Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter Video URL'
        required: true
        type: string
      quality:
        description: 'Select Max Quality'
        required: true
        default: '1080'
        type: choice
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - 'best'
      file_extension:
        description: 'Select File Extension'
        required: true
        default: 'mp4'
        type: choice
        options:
          - 'mp4'
          - 'mkv'
          - 'mp3'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade pip
          pip install yt-dlp

      - name: Download Video
        run: |
          # ایجاد پوشه دانلود در صورتی که وجود نداشته باشد
          mkdir -p downloads
          
          QUALITY="${{ github.event.inputs.quality }}"
          FORMAT="${{ github.event.inputs.file_extension }}"
          URL="${{ github.event.inputs.url }}"

          if [ "$FORMAT" == "mp3" ]; then
            yt-dlp -x --audio-format mp3 "$URL" -o "downloads/%(title)s.%(ext)s" --no-check-certificate
          else
            if [ "$QUALITY" == "best" ]; then
              yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format "$FORMAT" "$URL" -o "downloads/%(title)s.%(ext)s" --no-check-certificate
            else
              yt-dlp -f "bestvideo[height<=$QUALITY]+bestaudio/best[height<=$QUALITY]/best" --merge-output-format "$FORMAT" "$URL" -o "downloads/%(title)s.%(ext)s" --no-check-certificate
            fi
          fi

      - name: Upload Artifact
        if: always() # حتی اگر مراحل قبل خطا داشت، سعی کن اگر فایلی هست آپلود کنی
        uses: actions/upload-artifact@v4
        
