name: Smart Downloader Pro

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (YouTube, etc.)'
        required: true
        type: string
      mode:
        description: 'Download Mode'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio_only
      quality:
        description: 'Video Quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
      file_ext:
        description: 'File Format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mkv
          - mp3
          - m4a
      split_size:
        description: 'Split size (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install -U yt-dlp

      - name: Download Content
        env:
          VIDEO_URL: ${{ inputs.url }}
          DOWNLOAD_MODE: ${{ inputs.mode }}
          VIDEO_QUALITY: ${{ inputs.quality }}
          FILE_FORMAT: ${{ inputs.file_ext }}
        run: |
          mkdir -p downloads
          cd downloads
          
          if [ "$DOWNLOAD_MODE" = "audio_only" ]; then
            yt-dlp -x --audio-format "$FILE_FORMAT" --restrict-filenames --no-playlist -o "%(title)s.%(ext)s" "$VIDEO_URL"
            exit 0
          fi
          
          if [ "$VIDEO_QUALITY" = "1080p" ]; then
            yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" --merge-output-format "$
