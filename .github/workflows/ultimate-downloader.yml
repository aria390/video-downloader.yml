name: Smart Downloader Pro

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (YouTube, etc.)'
        required: true
        type: string
      mode:
        description: 'Download Mode'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio_only
      quality:
        description: 'Video Quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
      file_ext:
        description: 'File Format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mkv
          - mp3
          - m4a
      split_size:
        description: 'Split size (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    env:
      DL_URL: ${{ inputs.url }}
      DL_MODE: ${{ inputs.mode }}
      DL_QUALITY: ${{ inputs.quality }}
      DL_EXT: ${{ inputs.file_ext }}
      DL_SPLIT: ${{ inputs.split_size }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install -U yt-dlp

      - name: Download Content
        run: |
          mkdir -p downloads
          cd downloads
          echo "URL: $DL_URL"
          echo "Mode: $DL_MODE"
          echo "Quality: $DL_QUALITY"
          echo "Format: $DL_EXT"
