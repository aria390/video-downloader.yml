name: 🎬 Pro Video/Audio Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'Mode'
        required: true
        default: 'video'
        type: choice
        options: [video, audio_only]
      quality:
        description: 'Quality'
        required: true
        default: 'best'
        type: choice
        options: [best, 1080p, 720p, 480p]
      file_ext:
        description: 'Extension'
        required: true
        default: 'mp4'
        type: choice
        options: [mp4, mkv, mp3, m4a]
      split_size:
        description: 'Split Size (MB)'
        required: false
        default: '90'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 zip
          python3 -m pip install -U yt-dlp

      - name: Execute Download
        run: |
          mkdir -p downloads
          cd downloads
          URL="${{ github.event.inputs.url }}"
          MODE="${{ github.event.inputs.mode }}"
          QUALITY="${{ github.event.inputs.quality }}"
          EXT="${{ github.event.inputs.file_ext }}"
          echo "URL: $URL"
          echo "Mode: $MODE | Quality: $QUALITY | Format: $EXT"
          if [ "$QUALITY" = "1080p" ]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [ "$QUALITY" = "720p" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480p" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="bestvideo+bestaudio/best"
          fi
          if [ "$MODE" = "audio_only" ]; then
            yt-dlp -x --audio-format "$EXT" --restrict-filenames --no-playlist 
