name: Smart Downloader Pro

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (YouTube, etc.)'
        required: true
        type: string
      mode:
        description: 'Download Mode'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio_only
      quality:
        description: 'Video Quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
      file_ext:
        description: 'File Format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mkv
          - mp3
          - m4a
      split_size:
        description: 'Split size (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install -U yt-dlp

      - name: Download Content
        run: |
          mkdir -p downloads
          cd downloads
          yt-dlp --cookies-from-browser chrome --restrict-filenames --no-playlist -o "%(title)s.%(ext)s" "${{ inputs.url }}"

      - name: Process Large Files
        run: |
          cd downloads
          for file in *; do
            if [ -f "$file" ]; then
              size_bytes=$(stat -c%s "$file")
              size_mb=$((size_bytes / 1024 / 1024))
              echo "File: $file - Size: ${size_mb}MB"
              if [ $size_mb -gt 1800 ]; then
                echo "File too large, removing..."
                rm "$file"
