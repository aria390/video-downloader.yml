name: 🎬 Pro Video/Audio Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'Download Mode'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio_only
      quality:
        description: 'Select Quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
      file_ext:
        description: 'File Extension'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mkv
          - mp3
          - m4a
      split_size:
        description: 'Split files larger than (MB)'
        required: false
        default: '90'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2 zip
          pip install yt-dlp

      - name: Execute Download
        run: |
          mkdir -p downloads
          
          # تنظیمات کیفیت بر اساس انتخاب کاربر
          if [ "${{ github.event.inputs.quality }}" == "1080p" ]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [ "${{ github.event.inputs.quality }}" == "720p" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "${{ github.event.inputs.quality }}" == "480p" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="best"
          fi

          # اجرای دانلود بر اساس مود (ویدیو یا فقط صدا)
          if [ "${{ github.event.inputs.mode }}" == "audio_only" ]; then
            yt-dlp -x --audio-format "${{ github.event.inputs.file_ext }}" \
            -o "
