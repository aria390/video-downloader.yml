name: 🎬 Pro Video/Audio Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'Download Mode'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio_only
      quality:
        description: 'Select Quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
      file_ext:
        description: 'File Extension'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mkv
          - mp3
          - m4a
      split_size:
        description: 'Split files larger than (MB)'
        required: false
        default: '90'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2 zip
          python3 -m pip install -U yt-dlp

      - name: Execute Download
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          MODE: ${{ github.event.inputs.mode }}
          QUALITY: ${{ github.event.inputs.quality }}
          EXT: ${{ github.event.inputs.file_ext }}
        run: |
          mkdir -p downloads
          
          # تنظیم کیفیت
          if [ "$QUALITY" == "1080p" ]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [ "$QUALITY" == "720p" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" == "480p" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="best"
          fi

